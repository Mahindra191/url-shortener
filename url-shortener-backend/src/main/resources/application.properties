spring.application.name=url-shortener

# --- DATABASE TUNNEL & HYBRID CONNECTIVITY ---
# Tries to find K8s environment variables first; falls back to localhost for your IDE + port-forwarding.
spring.data.mongodb.uri=mongodb://${MONGO_HOST:localhost}:27017/shortener_db
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

# --- CONNECTION STABILITY WORKAROUNDS ---
# Prevents "Connection forcibly closed by peer" errors over local port-forwarding tunnels
spring.data.redis.lettuce.shutdown-timeout=100ms
spring.data.redis.timeout=2000ms
spring.data.mongodb.additional-values.maxConnectionIdleTimeMS=60000

# --- LOCAL SERVER CONFIGURATION ---
# Keeps port 8080 open for local testing. (Ensure K8s application pods remain scaled down to 0)
server.port=8080

# --- PRODUCTION READINESS & GRACEFUL SHUTDOWN ---
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# --- DEBUG LOGGING ---
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.com.dev.project.url_shortener=DEBUG

# Expose health and metric endpoints over the web
management.endpoints.web.exposure.include=health,metrics

# Provide full, detailed status check details for databases and cache
management.endpoint.health.show-details=always