apiVersion: v1
kind: Service
metadata:
  name: url-shortener-service
spec:
  type: NodePort # 🎯 Changed from LoadBalancer to bypass Docker's Windows network gate
  selector:
    app: url-shortener
  ports:
    - protocol: TCP
      port: 8080      # The port inside your Spring Boot container
      targetPort: 8080
      nodePort: 30080 # 🎯 FORCES Windows to route traffic directly to http://localhost:30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener-deployment
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: url-shortener
  template:
    metadata:
      labels:
        app: url-shortener
    spec:
      containers:
      - name: url-shortener
        image: mahi1707/url-shortener:v3
        imagePullPolicy: IfNotPresent  
        ports:
        - containerPort: 8080
        env:
        - name: MONGO_HOST
          value: "mongodb-service"
        - name: MONGO_USER
          value: "root"
        - name: MONGO_PASSWORD
          value: "example"
        - name: REDIS_HOST
          value: "redis-service"